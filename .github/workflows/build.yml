name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  daemon:
    name: Build Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('daemon/Cargo.lock') }}

      - name: Check formatting
        working-directory: daemon
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: daemon
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: daemon
        run: cargo test

      - name: Build release
        working-directory: daemon
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mugen-daemon
          path: daemon/target/release/mugen-daemon

  launcher:
    name: Build Launcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install dependencies
        working-directory: launcher
        run: npm ci

      - name: Type check
        working-directory: launcher
        run: npx tsc --noEmit

      - name: Build
        working-directory: launcher
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mugen-launcher-ui
          path: launcher/dist/

  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Test
        working-directory: backend
        run: npm test || echo "No tests yet"
